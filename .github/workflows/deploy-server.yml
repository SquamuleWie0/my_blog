name: Deploy VitePress site to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: server-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: 101.43.28.73
      SERVER_PORT: 22
      SERVER_USER: root
      SERVER_TARGET_DIR: /usr/share/nginx/html
      VITEPRESS_BASE: /

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress for server root
        run: npm run docs:build

      - name: Check deploy secret
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$SERVER_SSH_KEY" ]; then
            echo "::error::SERVER_SSH_KEY is not configured. Add it in GitHub repository Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Configure SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/wie0_blog_deploy_key
          chmod 600 ~/.ssh/wie0_blog_deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to nginx html directory
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/wie0_blog_deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" "mkdir -p '$SERVER_TARGET_DIR'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/wie0_blog_deploy_key -p $SERVER_PORT" \
            docs/.vitepress/dist/ \
            "$SERVER_USER@$SERVER_HOST:$SERVER_TARGET_DIR/"
